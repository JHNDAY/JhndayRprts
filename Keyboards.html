<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }

  h1 {
    color: #e0e0e0;
    font-size: 1.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
    font-weight: 300;
  }

  .toggle-wrapper {
    display: flex;
    align-items: center;
    background: #0f0f1a;
    border-radius: 50px;
    padding: 6px;
    margin-bottom: 36px;
    border: 1px solid #333;
    gap: 4px;
  }

  .toggle-btn {
    padding: 10px 28px;
    border-radius: 44px;
    border: none;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.04em;
    color: #888;
    background: transparent;
  }

  .toggle-btn.active {
    color: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .toggle-btn.mac.active  { background: #555; }
  .toggle-btn.pc.active   { background: #0078d4; }

  .toggle-btn:hover:not(.active) { color: #ccc; }

  .keyboard-frame {
    background: #111;
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px #333;
    max-width: 860px;
    width: 100%;
  }

  .keyboard-img {
    display: none;
    width: 100%;
    border-radius: 10px;
  }

  .keyboard-img.visible { display: block; }

  .label {
    text-align: center;
    margin-top: 18px;
    font-size: 0.85rem;
    color: #555;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<h1>Keyboards</h1>

<div class="toggle-wrapper">
  <button class="toggle-btn mac active" onclick="show('mac')">&#xf8ff; Mac</button>
  <button class="toggle-btn pc" onclick="show('pc')">⊞ Windows</button>
</div>
